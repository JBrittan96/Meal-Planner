name: Supabase Keepalive

on:
  schedule:
    - cron: '0 7 * * 1,3,5'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  keepalive:
    runs-on: ubuntu-latest
    steps:
      - name: Check out the repo
        uses: actions/checkout@v4

      - name: Ping Supabase
        run: |
          curl --fail --silent --show-error \
            "https://xyopoilevujzyknuqgfh.supabase.co/rest/v1/profiles?select=id&limit=1" \
            -H "apikey: sb_publishable_1vQpgaAQGezUUhOfbB9ndw_GuYuxs5M" \
            -H "Authorization: Bearer sb_publishable_1vQpgaAQGezUUhOfbB9ndw_GuYuxs5M"

      - name: Keep this workflow from being disabled
        uses: gautamkrishnar/keepalive-workflow@v2
        with:
          use_api: false
