name: Supabase Keepalive

on:
  schedule:
    - cron: '0 7 * * 1,3,5'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  keepalive:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Supabase
        run: |
          curl --fail --silent --show-error \
            "https://xyopoilevujzyknuqgfh.supabase.co/rest/v1/profiles?select=id&limit=1" \
            -H "apikey: sb_publishable_1vQpgaAQGezUUhOfbB9ndw_GuYuxs5M" \
            -H "Authorization: Bearer sb_publishable_1vQpgaAQGezUUhOfbB9ndw_GuYuxs5M"

      - name: Nudge the repo if it has been quiet
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git clone "https://x-access-token:${GH_TOKEN}@github.com/${GITHUB_REPOSITORY}.git" repo
          cd repo
          LAST=$(git log -1 --format=%ct)
          NOW=$(date -u +%s)
          AGE_DAYS=$(( (NOW - LAST) / 86400 ))
          echo "Last commit was $AGE_DAYS days ago."
          if [ "$AGE_DAYS" -ge 45 ]; then
            mkdir -p .github
            date -u +"Last keepalive nudge: %Y-%m-%d" > .github/keepalive.txt
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add .github/keepalive.txt
            git commit -m "chore: keepalive nudge"
            git push
            echo "Nudge committed."
          else
            echo "Repo is active enough; no nudge needed."
          fi
